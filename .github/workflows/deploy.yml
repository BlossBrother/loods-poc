name: Deploy naar Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
# Secrets instellen in GitHub (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   (Cloudflare token met "Edit Workers"-rechten)
#   CLOUDFLARE_ACCOUNT_ID  (je Cloudflare account-ID)
# Het AIRTABLE_TOKEN blijft een Worker-secret in Cloudflare (apart, niet in GitHub).
